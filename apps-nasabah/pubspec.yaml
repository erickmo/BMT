name: app_nasabah
description: "BMT SaaS - Aplikasi Nasabah & Wali Santri"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Network
  dio: ^5.8.0+1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1

  # DI
  get_it: ^8.0.0

  # Functional
  dartz: ^0.10.1

  # Auth
  local_auth: ^2.3.0
  pin_code_fields: ^8.0.1

  cupertino_icons: ^1.0.8
  bloc_test: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
